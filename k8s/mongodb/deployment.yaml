apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: bluemarble
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          # We will define this secret in Step 4
          valueFrom:
            secretKeyRef:
              name: bluemarble-secrets
              key: mongodb-root-password
        - name: MONGO_INITDB_DATABASE
          value: "bluemarble"
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc