version: "3.9"

services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/bluemarble

  client:
    build: ./client
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo-data: