name: OpenBank Feature CI/CD

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Test Backend
        run: |
          if [ -d "backend" ] && [ -f "backend/package.json" ]; then
            cd backend
            npm install
            npm test
          else
            echo "Backend directory or package.json not found, skipping tests."
          fi
        continue-on-error: true 

  docker-build:
    name: Dockerize Feature
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Frontend Image
        run: |
          if [ -f "frontend/Dockerfile" ]; then
            docker build -t openbank-frontend:feature-${{ github.sha }} ./frontend
          else
            echo "Skipping: frontend/Dockerfile is not yet created."
          fi

      - name: Build Backend Image
        run: |
          if [ -f "backend/Dockerfile" ]; then
            docker build -t openbank-backend:feature-${{ github.sha }} ./backend
          else
            echo "Skipping: backend/Dockerfile is not yet created."
          fi

  deploy:
    name: Deploy to Sandbox
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Cluster
        run: |
          if [ -d "k8s" ] && [ "$(ls -A k8s/)" ]; then
            kubectl apply -f k8s/
          else
            echo "K8s manifests folder missing or empty, skipping deployment."
          fi
