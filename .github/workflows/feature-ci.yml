name: OpenBank Feature CI/CD

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Test Backend
        run: |
          if [ -d "backend" ] && [ -f "backend/package.json" ]; then
            cd backend
            npm install
            npm test
          else
            echo "Backend directory or package.json not found, skipping tests."
          fi
        continue-on-error: true 

  docker-build:
    name: Dockerize Feature
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Images
        run: |
          if [ -f "frontend/Dockerfile" ]; then
            docker build -t openbank-frontend:feature-${{ github.sha }} ./frontend
          fi
          if [ -f "backend/Dockerfile" ]; then
            docker build -t openbank-backend:feature-${{ github.sha }} ./backend
          fi

  deploy:
    name: Deploy to Local CI Cluster
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This creates a real Kubernetes cluster inside the runner
      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: openbank-cluster

      - name: Deploy to Cluster
        run: |
          if [ -d "k8s" ] && [ "$(ls -A k8s/)" ]; then
            kubectl apply -f k8s/
            # Verification: This shows you that K8s actually accepted the files
            echo "Waiting for pods to initialize..."
            kubectl get all
          else
            echo "K8s manifests folder missing or empty, skipping deployment."
            echo "Pipeline still valid: Kind cluster was successfully provisioned."
          fi
