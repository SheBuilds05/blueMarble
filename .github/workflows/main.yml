name: Feature Branch CI

on:
  push:
    branches: [ "feature/*", "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend
        
      - name: Syntax & Lint Check
        # Now that the files are fixed, this gate will pass
        run: npm run lint
        working-directory: ./frontend

      - name: Build Frontend Docker Image (Verify)
        # This confirms the Dockerfile is valid for the IBM simulation
        run: |
          docker build -t openbank-frontend:test ./frontend

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install Backend Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Build Backend Docker Image (Verify)
        run: |
          docker build -t openbank-backend:test ./backend
