name: Main Branch Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bluemarble-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bluemarble-frontend:latest

  deploy-to-openshift:
    needs: build-and-push # Ensures we don't deploy if the build fails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true

      - name: Deploy Kubernetes Manifests
        run: |
          # Apply the configurations
          oc apply -f k8s/namespace.yaml
          oc apply -f k8s/configmap.yaml
          oc apply -f k8s/secrets.yaml
          oc apply -f k8s/backend/
          oc apply -f k8s/frontend/
          
          # Force the pods to refresh with the new images
          oc rollout restart deployment/backend -n bluemarble
          oc rollout restart deployment/frontend -n bluemarble
