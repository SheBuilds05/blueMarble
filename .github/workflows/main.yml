name: Feature Branch CI

on:
  push:
    branches: [ "feature/*", "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # FIX 1: Corrected path for caching (removed leading ./)
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend
        
      - name: Pipeline-Side Lint Patch
        # FIX 2: This fixes the code ONLY inside the runner environment
        run: |
          # 1. Inject eslint-env node into tailwind config to fix 'module' error
          sed -i '1i /* eslint-env node */' tailwind.config.js
          
          # 2. Remove the unused tailwindcss import in vite config
          sed -i '/import tailwindcss from/d' vite.config.js
        working-directory: ./frontend

      - name: Check Syntax & Linting
        run: npm run lint
        working-directory: ./frontend

      - name: Build Frontend Docker Image (Verify)
        run: docker build -t openbank-frontend:test ./frontend

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # FIX 3: Consistent caching path for backend
          cache-dependency-path: backend/package-lock.json
          
      - name: Install Backend Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Build Backend Docker Image (Verify)
        run: docker build -t openbank-backend:test ./backend
