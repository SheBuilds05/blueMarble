name: Develop Branch CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Matches Week 1 requirements

      - name: Install & Test Backend
        run: |
          cd backend
          npm install
          npm test

      - name: Build Docker Images
        run: |
          docker build -t openbank-frontend ./frontend
          docker build -t openbank-backend ./backend

      - name: Verify K8s Manifests
        run: |
          # Validates your Week 3 Kubernetes YAML files for syntax errors
          kubectl apply --dry-run=client -f k8s/
